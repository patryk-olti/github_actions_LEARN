name: CI - Node.JS

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

env:
  NODE_BUILD_VERSION: 22

jobs:
  Lint:
  runs-on: ubuntu-latest

  steps:
    - uses: ./.github/actions/setup-node
      with:
        node-version: ${{ env.NODE_BUILD_VERSION }}

    - run: npm run lint

  Test:
  runs-on: ubuntu-latest
  needs: Lint

  strategy:
    matrix:
      node-version: [20, 22, 24]

  steps:
    - uses: ./.github/actions/setup-node
      with:
        node-version: ${{ matrix.node-version }}

    - run: npm test

Build:
  if: github.ref == 'refs/heads/master'

  runs-on: ubuntu-latest
  needs: Test

  steps:
    - uses: ./.github/actions/setup-node
      with:
        node-version: ${{ env.NODE_BUILD_VERSION }}

    - name: Build
      run: npm run build


  Environment:
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Print var
        run: echo ${{ vars.KEY }}
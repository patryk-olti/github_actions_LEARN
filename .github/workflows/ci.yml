on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

env:
  NODE_BUILD_VERSION: 22

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/node-setup
        with:
          node-version: ${{ env.NODE_BUILD_VERSION }}

      - run: npm run lint


  Test:
    runs-on: ubuntu-latest
    needs: Lint

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/node-setup
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm test


  Build:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: Test

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/node-setup
        with:
          node-version: ${{ env.NODE_BUILD_VERSION }}

      - name: Build
        run: npm run build


  Environment:
    runs-on: ubuntu-latest
    needs: Build
    environment: production

    steps:
      - name: Print var
        run: echo "${{ vars.KEY }}"
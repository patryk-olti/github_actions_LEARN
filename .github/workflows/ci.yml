name: CI - Node.JS

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

env:
  NODE_BUILD_VERSION: 22

jobs:
  hello_world:
    runs-on: ubuntu-latest

    steps:
      - name: Print hello_world
        run: echo "Hello World!"

  Lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node.JS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  Test:
    runs-on: ubuntu-latest
    needs: Lint

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Test
        run: npm run test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ env.NODE_BUILD_VERSION }}
          path: coverage/
          if-no-files-found: ignore

  Build:
    if: github.ref == 'refs/heads/master'
    
    runs-on: ubuntu-latest
    needs: Test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node.JS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_BUILD_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build